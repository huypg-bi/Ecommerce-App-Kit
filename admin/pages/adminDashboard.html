<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/adminDashboard.css">
</head>

<body>

    <div class="admin-wrapper">

        <!-- ================ SIDEBAR ================ -->
        <aside class="admin-sidebar" id="adminSidebar">

            <!-- Logo -->
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <img src="../../assets/svg/Icon.svg" alt="app-logo">
                </div>
                <div class="logo-text">E<span>-</span>comm</div>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-nav">

                <div class="nav-section">
                    <p class="nav-section-title">Main</p>

                    <p class="nav-item active">
                        Dashboard
                    </p>

                    <a class="nav-item" data-page="categories">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
                        </svg>
                        Categories
                    </a>

                    <a class="nav-item" data-page="products">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                        Products
                    </a>

                    <div class="nav-section">
                        <p class="nav-section-title">Settings</p>

                        <a class="nav-item" data-page="setting">
                            <span class="nav-icon">
                                <svg viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="3" />
                                    <path
                                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                                </svg>
                            </span>
                            Settings
                        </a>

                        <a class="nav-item" data-page="help&sp">
                            <span class="nav-icon">
                                <svg viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10" />
                                    <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" />
                                    <line x1="12" y1="17" x2="12.01" y2="17" />
                                </svg>
                            </span>
                            Help &amp; Support
                        </a>
                    </div>

            </nav>
        </aside>


        <!-- ================ MAIN ================ -->
        <main class="admin-main" id="adminMain">

            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="topbar-left">
                    <div class="page-breadcrumb">
                        <span>Pages</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                        <span class="breadcrumb-current">Dashboard</span>
                    </div>
                </div>

                <div class="topbar-right">
                    <span>Admin</span>
                    <button id="logoutBtn" class="logout-btn" title="Logout">
                        <img src="../../assets/svg/logout-svgrepo-com.svg" alt="logout">
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="admin-content">

            </div>

        </main>

    </div>

    <script type="module" src="../js/admin_dashboard.js"></script>
</body>

</html>
