<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="intro">
            <img src="../assets/svg/Icon.svg" alt="logo">
            <h3>Welcome to E-com</h3>
            <p>Sign in to continue</p>
        </div>

        <form action="" id="login-form">
            <div class="email-input">
                <img src="../assets/img/Message.png" alt="">
                <input type="email" placeholder="Your email" id="email" required>
            </div>

            <div class="pass-input">
                <img src="../assets/img/Password.png" alt="">
                <input type="password" placeholder="Password" id="password" required>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div class="divider">OR</div>

        <button><img src="../assets/img/Google.png" alt="gg-login">Login with Google</button>
        <button><img src="../assets/img/Facebook1.png" alt="fb-login">Login with Facebook</button>

        <a href="#">Forgot Password?</a>

        <div class="register">
            Don't have a account?
            <a href="../pages/register.html">Register</a>
        </div>

        <a href="../index.html" class="back-home">← Back to Home</a>
    </div>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
